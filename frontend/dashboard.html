<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FortressVault</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div id="navbar-container"></div>
        
        <div class="p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1"><i class="fas fa-tachometer-alt text-primary me-2"></i>Dashboard</h2>
                <p class="text-muted mb-0">Overview of your vault</p>
            </div>
            
            <!-- Statistics Cards -->
            <div class="row g-4 mb-4">
                <div class="col-md-3 col-sm-6">
                    <div class="stat-card card">
                        <div class="card-body d-flex align-items-center">
                            <div class="icon bg-primary bg-opacity-10 rounded-3 p-3 me-3">
                                <i class="fas fa-key text-primary fa-2x"></i>
                            </div>
                            <div class="flex-grow-1">
                                <h5 class="mb-0 fw-bold" id="stat-vault">0</h5>
                                <p class="mb-0 text-muted small">Total Vault Items</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-3 col-sm-6">
                    <div class="stat-card card">
                        <div class="card-body d-flex align-items-center">
                            <div class="icon bg-success bg-opacity-10 rounded-3 p-3 me-3">
                                <i class="fas fa-folder text-success fa-2x"></i>
                            </div>
                            <div class="flex-grow-1">
                                <h5 class="mb-0 fw-bold" id="stat-categories">4</h5>
                                <p class="mb-0 text-muted small">Categories</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-3 col-sm-6">
                    <div class="stat-card card">
                        <div class="card-body d-flex align-items-center">
                            <div class="icon bg-info bg-opacity-10 rounded-3 p-3 me-3">
                                <i class="fas fa-history text-info fa-2x"></i>
                            </div>
                            <div class="flex-grow-1">
                                <h5 class="mb-0 fw-bold" id="stat-audit">0</h5>
                                <p class="mb-0 text-muted small">Audit Logs</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-3 col-sm-6">
                    <div class="stat-card card">
                        <div class="card-body d-flex align-items-center">
                            <div class="icon bg-warning bg-opacity-10 rounded-3 p-3 me-3">
                                <i class="fas fa-shield-alt text-warning fa-2x"></i>
                            </div>
                            <div class="flex-grow-1">
                                <h5 class="mb-0 fw-bold">Secure</h5>
                                <p class="mb-0 text-muted small">Security Status</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Charts & Recent Activity -->
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white">
                            <h5 class="mb-0 fw-bold"><i class="fas fa-chart-line text-primary me-2"></i>Recent Activity</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="activity-chart"></canvas>
                        </div>
                    </div>
                </div>
                
                <div class="col-lg-4">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white">
                            <h5 class="mb-0 fw-bold"><i class="fas fa-bell text-primary me-2"></i>Latest Logs</h5>
                        </div>
                        <div class="card-body">
                            <div id="recent-logs" class="list-group list-group-flush">
                                <p class="text-muted text-center py-3">Loading logs...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="footer-container"></div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/app.js?v=3"></script>
    <script src="assets/js/components.js?v=3"></script>
    
    <script>
        let activityChart;
        
        document.addEventListener('DOMContentLoaded', async () => {
            const user = jwtUtils.getUser();
            if (user && user.role_name === 'User') {
                window.location.href = 'vault.html';
                return;
            }
            components.load('dashboard');
            await loadDashboardData();
        });
        
        async function loadDashboardData() {
            loadingUtils.show();
            
            try {
                // Load vault items
                const vaultItems = await api.get('/api/vault/items');
                document.getElementById('stat-vault').textContent = vaultItems.length;
                
                // Load audit logs
                const auditLogs = await api.get('/api/audit/logs');
                document.getElementById('stat-audit').textContent = auditLogs.length;
                
                // Render recent logs
                renderRecentLogs(auditLogs.slice(0, 5));
                
                // Render chart
                renderActivityChart(auditLogs);
            } catch (error) {
                toastUtils.show('Failed to load dashboard data', 'error');
            } finally {
                loadingUtils.hide();
            }
        }
        
        function renderRecentLogs(logs) {
            const container = document.getElementById('recent-logs');
            
            if (!logs.length) {
                container.innerHTML = '<p class="text-muted text-center py-3">No activity yet</p>';
                return;
            }
            
            container.innerHTML = logs.map(log => `
                <div class="list-group-item d-flex align-items-center border-0 px-0">
                    <i class="fas fa-circle text-primary me-2" style="font-size: 8px;"></i>
                    <div class="flex-grow-1">
                        <p class="mb-0 small fw-medium">${log.action_name}</p>
                        <p class="mb-0 text-muted small">${new Date(log.created_at).toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }
        
        function renderActivityChart(logs) {
            const ctx = document.getElementById('activity-chart').getContext('2d');
            
            // Group logs by date
            const activityData = {};
            logs.forEach(log => {
                const date = new Date(log.created_at).toLocaleDateString();
                activityData[date] = (activityData[date] || 0) + 1;
            });
            
            const labels = Object.keys(activityData).slice(-7);
            const data = labels.map(date => activityData[date]);
            
            if (activityChart) {
                activityChart.destroy();
            }
            
            activityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Activity',
                        data: data,
                        borderColor: '#2563EB',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }
    </script>
</body>
</html>
