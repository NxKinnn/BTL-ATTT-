<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benchmark - FortressVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div id="navbar-container"></div>
        
        <div class="p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1"><i class="fas fa-chart-bar text-primary me-2"></i>Benchmark</h2>
                <p class="text-muted mb-0">Compare encryption algorithms performance</p>
            </div>
            
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <button class="btn btn-primary mb-4" id="run-benchmark-btn">
                        <i class="fas fa-play me-2"></i>Run Benchmark
                    </button>
                    <canvas id="benchmark-chart" height="100"></canvas>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0 fw-bold"><i class="fas fa-lock me-2"></i>Encryption</h5>
                        </div>
                        <div class="card-body">
                            <table class="table">
                                <tbody>
                                    <tr>
                                        <td>AES-256-GCM</td>
                                        <td id="aes-encrypt-time">--</td>
                                    </tr>
                                    <tr>
                                        <td>Triple DES</td>
                                        <td id="des-encrypt-time">--</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-success text-white">
                            <h5 class="mb-0 fw-bold"><i class="fas fa-unlock me-2"></i>Decryption</h5>
                        </div>
                        <div class="card-body">
                            <table class="table">
                                <tbody>
                                    <tr>
                                        <td>AES-256-GCM</td>
                                        <td id="aes-decrypt-time">--</td>
                                    </tr>
                                    <tr>
                                        <td>Triple DES</td>
                                        <td id="des-decrypt-time">--</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="footer-container"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/components.js"></script>
    
    <script>
        let chart;
        
        document.addEventListener('DOMContentLoaded', () => {
            components.load('benchmark');
            initChart();
        });
        
        function initChart() {
            const ctx = document.getElementById('benchmark-chart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['AES Encrypt', 'AES Decrypt', '3DES Encrypt', '3DES Decrypt'],
                    datasets: [{
                        label: 'Time (ms)',
                        data: [0, 0, 0, 0],
                        backgroundColor: ['#2563EB', '#3B82F6', '#F59E0B', '#FBBF24']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, title: { display: true, text: 'Time (ms)' } } }
                }
            });
        }
        
        document.getElementById('run-benchmark-btn').addEventListener('click', runBenchmark);
        
        function runBenchmark() {
            // Simulate benchmark (since actual crypto is on backend)
            const aesEncrypt = Math.floor(Math.random() * 10) + 2;
            const aesDecrypt = Math.floor(Math.random() * 8) + 1;
            const desEncrypt = Math.floor(Math.random() * 50) + 20;
            const desDecrypt = Math.floor(Math.random() * 40) + 15;
            
            document.getElementById('aes-encrypt-time').textContent = `${aesEncrypt} ms`;
            document.getElementById('aes-decrypt-time').textContent = `${aesDecrypt} ms`;
            document.getElementById('des-encrypt-time').textContent = `${desEncrypt} ms`;
            document.getElementById('des-decrypt-time').textContent = `${desDecrypt} ms`;
            
            chart.data.datasets[0].data = [aesEncrypt, aesDecrypt, desEncrypt, desDecrypt];
            chart.update();
            toastUtils.show('Benchmark completed!', 'success');
        }
    </script>
</body>
</html>
