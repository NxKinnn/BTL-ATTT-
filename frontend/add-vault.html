<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vault Item - FortressVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css?v=3" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div id="navbar-container"></div>
        
        <div class="p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1"><i class="fas fa-plus-circle text-primary me-2"></i>Add Vault Item</h2>
                <p class="text-muted mb-0">Create a new secure credential or personal data entry</p>
            </div>
            
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form id="add-vault-form">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Title / Tên bản ghi <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="item-name" required placeholder="e.g. Thông tin cá nhân demo">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-medium">Full name / Họ tên</label>
                            <input type="text" class="form-control" id="full-name" placeholder="e.g. Nguyễn Xuân Kiên">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="e.g. kien.demo@gmail.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Phone / Số điện thoại</label>
                            <input type="text" class="form-control" id="phone" placeholder="e.g. 0987654321">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Identity number / CCCD hoặc số giấy tờ</label>
                            <input type="text" class="form-control" id="identity-number" placeholder="e.g. 012345678901">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-medium">Username (Optional)</label>
                            <input type="text" class="form-control" id="username" placeholder="e.g. user@gmail.com">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-medium">Password (Optional)</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" placeholder="Enter password if applicable">
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordField()">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn btn-outline-primary" type="button" onclick="generatePassword()">
                                    <i class="fas fa-magic"></i> Generate
                                </button>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-medium">Category</label>
                            <select class="form-select" id="category">
                                <option value="">Select category...</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-medium">Algorithm</label>
                            <input type="text" class="form-control" id="algorithm" value="AES-256-GCM" readonly disabled>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-medium">Note / Ghi chú nhạy cảm</label>
                            <textarea class="form-control" id="notes" rows="3" placeholder="Ghi chú nhạy cảm dùng để kiểm thử mã hóa"></textarea>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-medium">Master Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="master-password" required placeholder="Enter your master password to encrypt">
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Save to Vault
                            </button>
                            <button type="button" class="btn btn-outline-secondary" onclick="window.location.href='vault.html'">
                                <i class="fas fa-times me-2"></i>Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <div id="footer-container"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js?v=3"></script>
    <script src="assets/js/components.js?v=3"></script>
    
    <script>
        let categories = [];
        
        document.addEventListener('DOMContentLoaded', async () => {
            components.load('add-vault');
            await loadCategories();
            
            document.getElementById('add-vault-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const masterPassword = document.getElementById('master-password').value;
                const selectedCategoryId = document.getElementById('category').value;
                
                const data = {
                    item_name: document.getElementById('item-name').value,
                    title: document.getElementById('item-name').value,
                    full_name: document.getElementById('full-name') ? document.getElementById('full-name').value : null,
                    email: document.getElementById('email') ? document.getElementById('email').value : null,
                    phone: document.getElementById('phone') ? document.getElementById('phone').value : null,
                    identity_number: document.getElementById('identity-number') ? document.getElementById('identity-number').value : null,
                    username: document.getElementById('username') ? document.getElementById('username').value : null,
                    password: document.getElementById('password') ? document.getElementById('password').value : "",
                    notes: document.getElementById('notes').value,
                    note: document.getElementById('notes').value,
                    algorithm: "AES-256-GCM",
                    category_id: selectedCategoryId ? parseInt(selectedCategoryId) : null
                };
                
                loadingUtils.show();
                try {
                    await api.post(`/api/vault/create?master_password=${encodeURIComponent(masterPassword)}`, data);
                    toastUtils.show('Lưu vào Vault thành công!', 'success');
                    window.location.href = 'vault.html';
                } catch (error) {
                    toastUtils.show(error.message, 'error');
                } finally {
                    loadingUtils.hide();
                }
            });
        });
        
        async function loadCategories() {
            try {
                categories = await api.get('/api/vault/categories');
                const select = document.getElementById('category');
                select.innerHTML = '<option value="">Select category...</option>' + 
                    categories.map(cat => `<option value="${cat.category_id}">${cat.category_name}</option>`).join('');
            } catch (error) {
                toastUtils.show('Failed to load categories', 'error');
            }
        }
        
        function togglePasswordField() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        
        function generatePassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            let password = '';
            for (let i = 0; i < 16; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password').value = password;
        }
    </script>
</body>
</html>
