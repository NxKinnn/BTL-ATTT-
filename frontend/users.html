<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management - FortressVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div id="navbar-container"></div>
        
        <div class="p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1"><i class="fas fa-users text-primary me-2"></i>Users Management</h2>
                <p class="text-muted mb-0">System user accounts and roles overview (Admin Only)</p>
            </div>
            
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="fw-medium">ID</th>
                                    <th class="fw-medium">Username</th>
                                    <th class="fw-medium">Role</th>
                                    <th class="fw-medium">Status</th>
                                    <th class="fw-medium">Created At</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body">
                                <tr><td colspan="5" class="text-center py-4 text-muted">Loading users...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="footer-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js?v=3"></script>
    <script src="assets/js/components.js?v=3"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            components.load('users');
            await loadUsers();
        });
        
        async function loadUsers() {
            loadingUtils.show();
            try {
                const users = await api.get('/api/users');
                renderUsers(users);
            } catch (error) {
                toastUtils.show('Failed to load users. You may not have Admin permission.', 'error');
                if (error && error.status === 403) {
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                }
            } finally {
                loadingUtils.hide();
            }
        }
        
        function renderUsers(users) {
            const tbody = document.getElementById('users-table-body');
            
            if (!users || !users.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No users found</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.user_id}</td>
                    <td><i class="fas fa-user-circle text-primary me-2"></i><span class="fw-bold">${u.username}</span></td>
                    <td><span class="badge ${u.role_name === 'Admin' ? 'bg-danger' : (u.role_name === 'Auditor' ? 'bg-warning text-dark' : 'bg-primary')}">${u.role_name || 'User'}</span></td>
                    <td><span class="badge ${u.is_active ? 'bg-success' : 'bg-secondary'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                    <td>${new Date(u.created_at).toLocaleString()}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
