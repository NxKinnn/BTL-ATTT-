<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vault - FortressVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div id="navbar-container"></div>
        
        <div class="p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1"><i class="fas fa-key text-primary me-2"></i>My Vault</h2>
                    <p class="text-muted mb-0">Manage your credentials securely</p>
                </div>
                <a href="add-vault.html" class="btn btn-primary">
                    <i class="fas fa-plus me-2"></i>Add New
                </a>
            </div>
            
            <!-- Search -->
            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" id="search-input" class="form-control" placeholder="Search vault items...">
                </div>
            </div>
            
            <!-- Vault Table -->
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="fw-medium">Title / Item Name</th>
                                    <th class="fw-medium">Category</th>
                                    <th class="fw-medium">Algorithm</th>
                                    <th class="fw-medium">Created</th>
                                    <th class="fw-medium text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="vault-table-body">
                                <tr><td colspan="4" class="text-center py-4 text-muted">Loading vault items...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="footer-container"></div>
    </div>
    
    <!-- View/Edit Modal -->
    <div class="modal fade" id="vault-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="vault-modal-title">Vault Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="vault-modal-body">
                    <p class="text-center py-4">Loading...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Delete Modal -->
    <div class="modal fade" id="delete-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold"><i class="fas fa-exclamation-triangle me-2"></i>Confirm Delete</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this vault item? This action cannot be undone.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirm-delete-btn">Delete</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js?v=3"></script>
    <script src="assets/js/components.js?v=3"></script>
    
    <script>
        let vaultItems = [];
        let selectedItemId = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            components.load('vault');
            await loadVaultItems();
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                renderVaultItems(vaultItems.filter(item => 
                    item.item_name.toLowerCase().includes(e.target.value.toLowerCase())
                ));
            });
        });
        
        async function loadVaultItems() {
            loadingUtils.show();
            try {
                vaultItems = await api.get('/api/vault/items');
                renderVaultItems(vaultItems);
            } catch (error) {
                toastUtils.show('Failed to load vault items', 'error');
            } finally {
                loadingUtils.hide();
            }
        }
        
        function renderVaultItems(items) {
            const tbody = document.getElementById('vault-table-body');
            const user = jwtUtils.getUser() || {};
            const isAdmin = user.role_name === 'Admin';
            
            if (isAdmin) {
                const thead = document.querySelector('thead tr');
                if (thead) {
                    thead.innerHTML = `
                        <th class="fw-medium">Item Name / Title</th>
                        <th class="fw-medium">Owner / Username</th>
                        <th class="fw-medium">Category</th>
                        <th class="fw-medium">Algorithm</th>
                        <th class="fw-medium">Created At</th>
                        <th class="fw-medium">Ciphertext Preview</th>
                        <th class="fw-medium text-end">Actions</th>
                    `;
                }
                const h2 = document.querySelector('h2');
                if (h2) h2.innerHTML = '<i class="fas fa-lock text-primary me-2"></i>All System Vaults (Encrypted Metadata)';
            }
            
            if (!items.length) {
                tbody.innerHTML = `<tr><td colspan="${isAdmin ? 7 : 5}" class="text-center py-4 text-muted">No vault items found</td></tr>`;
                return;
            }
            
            tbody.innerHTML = items.map(item => {
                if (isAdmin) {
                    return `
                        <tr>
                            <td><i class="fas fa-key text-primary me-2"></i><strong>${item.title || item.item_name}</strong></td>
                            <td><span class="badge bg-secondary"><i class="fas fa-user me-1"></i>${item.owner || item.username || 'N/A'}</span></td>
                            <td><span class="badge bg-light text-dark border">${item.category_name || 'Other'}</span></td>
                            <td><span class="badge bg-info text-dark"><i class="fas fa-lock me-1"></i>${item.algorithm || 'AES-256-GCM'}</span></td>
                            <td>${new Date(item.created_at).toLocaleString()}</td>
                            <td><code class="text-muted small">${item.ciphertext_preview || 'Encrypted Hex...'}</code></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-secondary" onclick="viewMetadata(${item.vault_id})" title="View Metadata Only">
                                    <i class="fas fa-info-circle me-1"></i>View Metadata
                                </button>
                            </td>
                        </tr>
                    `;
                }
                return `
                    <tr>
                        <td><i class="fas fa-key text-primary me-2"></i>${item.item_name}</td>
                        <td><span class="badge bg-secondary">${item.category_name || 'Other'}</span></td>
                        <td><span class="badge bg-info text-dark"><i class="fas fa-lock me-1"></i>${item.algorithm || 'AES-256-GCM'}</span></td>
                        <td>${new Date(item.created_at).toLocaleString()}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="viewVaultItem(${item.vault_id})" title="View / Decrypt">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete(${item.vault_id})" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        async function viewVaultItem(vaultId) {
            const password = prompt('Enter your master password to decrypt:');
            if (!password) return;
            
            loadingUtils.show();
            try {
                const item = await api.get(`/api/vault/items/${vaultId}?master_password=${encodeURIComponent(password)}`);
                
                const modal = new bootstrap.Modal(document.getElementById('vault-modal'));
                document.getElementById('vault-modal-title').textContent = item.item_name;
                document.getElementById('vault-modal-body').innerHTML = `
                    <div class="mb-3">
                        <label class="form-label fw-medium text-muted small mb-1">Title / Tên bản ghi</label>
                        <p class="mb-0 text-primary fw-bold fs-5">${item.title || item.item_name || 'Untitled'}</p>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium text-muted small mb-1">Full Name / Họ tên</label>
                            <p class="mb-0 fw-medium">${item.full_name || 'N/A'}</p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium text-muted small mb-1">Email</label>
                            <p class="mb-0">${item.email || 'N/A'}</p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium text-muted small mb-1">Phone / Số điện thoại</label>
                            <p class="mb-0">${item.phone || 'N/A'}</p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium text-muted small mb-1">Identity Number / CCCD</label>
                            <p class="mb-0 fw-medium text-dark">${item.identity_number || 'N/A'}</p>
                        </div>
                    </div>
                    ${item.username ? `<div class="mb-3">
                        <label class="form-label fw-medium text-muted small mb-1">Username</label>
                        <p class="mb-0">${item.username}</p>
                    </div>` : ''}
                    ${item.password ? `<div class="mb-3">
                        <label class="form-label fw-medium text-muted small mb-1">Password</label>
                        <div class="input-group">
                            <input type="password" id="modal-password" class="form-control font-monospace" value="${item.password}" readonly>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility()" title="Toggle visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-outline-secondary" type="button" onclick="copyPassword('${item.password}')" title="Copy password">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>` : ''}
                    <div class="mb-3">
                        <label class="form-label fw-medium text-muted small mb-1">Note / Ghi chú nhạy cảm</label>
                        <div class="p-3 bg-light rounded border text-break">${item.notes || item.note || 'N/A'}</div>
                    </div>
                    <div class="row align-items-center">
                        <div class="col-md-6 mb-2 mb-md-0">
                            <label class="form-label fw-medium text-muted small mb-1">Algorithm</label>
                            <div><span class="badge bg-info text-dark px-3 py-2"><i class="fas fa-shield-alt me-1"></i>${item.algorithm || 'AES-256-GCM'}</span></div>
                        </div>
                        ${item.created_at ? `<div class="col-md-6">
                            <label class="form-label fw-medium text-muted small mb-1">Created At</label>
                            <p class="mb-0 text-muted small"><i class="far fa-clock me-1"></i>${new Date(item.created_at).toLocaleString()}</p>
                        </div>` : ''}
                    </div>
                `;
                modal.show();
            } catch (error) {
                const msg = (error && error.detail) || 'Failed to decrypt item. Please check your password.';
                toastUtils.show(msg, 'error');
            } finally {
                loadingUtils.hide();
            }
        }
        
        function viewMetadata(vaultId) {
            const item = vaultItems.find(i => i.vault_id === vaultId) || {};
            const modal = new bootstrap.Modal(document.getElementById('vault-modal'));
            document.getElementById('vault-modal-title').textContent = `Metadata View: ${item.title || item.item_name || 'Untitled'}`;
            document.getElementById('vault-modal-body').innerHTML = `
                <div class="alert alert-warning mb-3">
                    <i class="fas fa-shield-alt me-2"></i><strong>Encrypted Data Vault:</strong> Admin cannot decrypt sensitive user data by default. Only ciphertext and metadata are accessible.
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-medium text-muted small mb-1">Item Name / Title</label>
                        <p class="mb-0 fw-bold text-primary fs-5">${item.title || item.item_name || 'N/A'}</p>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-medium text-muted small mb-1">Owner / Username</label>
                        <p class="mb-0 fw-bold"><i class="fas fa-user me-1"></i>${item.owner || item.username || 'N/A'}</p>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-medium text-muted small mb-1">Category</label>
                        <p class="mb-0"><span class="badge bg-secondary">${item.category_name || 'Other'}</span></p>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-medium text-muted small mb-1">Algorithm</label>
                        <p class="mb-0"><span class="badge bg-info text-dark"><i class="fas fa-lock me-1"></i>${item.algorithm || 'AES-256-GCM'}</span></p>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium text-muted small mb-1">Created At</label>
                    <p class="mb-0 text-muted"><i class="far fa-clock me-1"></i>${new Date(item.created_at).toLocaleString()}</p>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium text-muted small mb-1">Ciphertext Preview (Encrypted Payload)</label>
                    <div class="p-3 bg-light rounded border font-monospace text-break text-muted">${item.ciphertext_preview || 'Encrypted Hex...'}</div>
                </div>
            `;
            modal.show();
        }
        
        function togglePasswordVisibility() {
            const input = document.getElementById('modal-password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        
        function copyPassword(password) {
            navigator.clipboard.writeText(password);
            toastUtils.show('Password copied to clipboard', 'success');
        }
        
        function confirmDelete(vaultId) {
            selectedItemId = vaultId;
            const modal = new bootstrap.Modal(document.getElementById('delete-modal'));
            modal.show();
            
            document.getElementById('confirm-delete-btn').onclick = async () => {
                loadingUtils.show();
                try {
                    await api.delete(`/api/vault/items/${vaultId}`);
                    toastUtils.show('Vault item deleted', 'success');
                    modal.hide();
                    loadVaultItems();
                } catch (error) {
                    toastUtils.show('Failed to delete item', 'error');
                } finally {
                    loadingUtils.hide();
                }
            };
        }
    </script>
</body>
</html>
