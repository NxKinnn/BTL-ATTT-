<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vault - FortressVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div id="navbar-container"></div>
        
        <div class="p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1"><i class="fas fa-key text-primary me-2"></i>My Vault</h2>
                    <p class="text-muted mb-0">Manage your credentials securely</p>
                </div>
                <a href="add-vault.html" class="btn btn-primary">
                    <i class="fas fa-plus me-2"></i>Add New
                </a>
            </div>
            
            <!-- Search -->
            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" id="search-input" class="form-control" placeholder="Search vault items...">
                </div>
            </div>
            
            <!-- Vault Table -->
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="fw-medium">Item Name</th>
                                    <th class="fw-medium">Category</th>
                                    <th class="fw-medium">Created</th>
                                    <th class="fw-medium text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="vault-table-body">
                                <tr><td colspan="4" class="text-center py-4 text-muted">Loading vault items...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="footer-container"></div>
    </div>
    
    <!-- View/Edit Modal -->
    <div class="modal fade" id="vault-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="vault-modal-title">Vault Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="vault-modal-body">
                    <p class="text-center py-4">Loading...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Delete Modal -->
    <div class="modal fade" id="delete-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold"><i class="fas fa-exclamation-triangle me-2"></i>Confirm Delete</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this vault item? This action cannot be undone.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirm-delete-btn">Delete</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/components.js"></script>
    
    <script>
        let vaultItems = [];
        let selectedItemId = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            components.load('vault');
            await loadVaultItems();
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                renderVaultItems(vaultItems.filter(item => 
                    item.item_name.toLowerCase().includes(e.target.value.toLowerCase())
                ));
            });
        });
        
        async function loadVaultItems() {
            loadingUtils.show();
            try {
                vaultItems = await api.get('/api/vault/items');
                renderVaultItems(vaultItems);
            } catch (error) {
                toastUtils.show('Failed to load vault items', 'error');
            } finally {
                loadingUtils.hide();
            }
        }
        
        function renderVaultItems(items) {
            const tbody = document.getElementById('vault-table-body');
            
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">No vault items found</td></tr>';
                return;
            }
            
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td><i class="fas fa-key text-primary me-2"></i>${item.item_name}</td>
                    <td><span class="badge bg-secondary">${item.category_name || 'Other'}</span></td>
                    <td>${new Date(item.created_at).toLocaleString()}</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="viewVaultItem(${item.vault_id})">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete(${item.vault_id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        async function viewVaultItem(vaultId) {
            const password = prompt('Enter your master password to decrypt:');
            if (!password) return;
            
            loadingUtils.show();
            try {
                const item = await api.get(`/api/vault/items/${vaultId}?master_password=${encodeURIComponent(password)}`);
                
                const modal = new bootstrap.Modal(document.getElementById('vault-modal'));
                document.getElementById('vault-modal-title').textContent = item.item_name;
                document.getElementById('vault-modal-body').innerHTML = `
                    <div class="mb-3">
                        <label class="form-label fw-medium">Item Name</label>
                        <p class="mb-0">${item.item_name}</p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Username</label>
                        <p class="mb-0">${item.username || 'N/A'}</p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Password</label>
                        <div class="input-group">
                            <input type="password" id="modal-password" class="form-control" value="${item.password}" readonly>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility()">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-outline-secondary" type="button" onclick="copyPassword('${item.password}')">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Notes</label>
                        <p class="mb-0">${item.notes || 'N/A'}</p>
                    </div>
                `;
                modal.show();
            } catch (error) {
                toastUtils.show('Failed to decrypt item. Please check your password.', 'error');
            } finally {
                loadingUtils.hide();
            }
        }
        
        function togglePasswordVisibility() {
            const input = document.getElementById('modal-password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        
        function copyPassword(password) {
            navigator.clipboard.writeText(password);
            toastUtils.show('Password copied to clipboard', 'success');
        }
        
        function confirmDelete(vaultId) {
            selectedItemId = vaultId;
            const modal = new bootstrap.Modal(document.getElementById('delete-modal'));
            modal.show();
            
            document.getElementById('confirm-delete-btn').onclick = async () => {
                loadingUtils.show();
                try {
                    await api.delete(`/api/vault/items/${vaultId}`);
                    toastUtils.show('Vault item deleted', 'success');
                    modal.hide();
                    loadVaultItems();
                } catch (error) {
                    toastUtils.show('Failed to delete item', 'error');
                } finally {
                    loadingUtils.hide();
                }
            };
        }
    </script>
</body>
</html>
