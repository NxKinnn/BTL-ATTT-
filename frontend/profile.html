<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - FortressVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div id="navbar-container"></div>
        
        <div class="p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1"><i class="fas fa-user text-primary me-2"></i>My Profile</h2>
                <p class="text-muted mb-0">Manage your account settings</p>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm text-center p-4">
                        <div class="mb-3">
                            <i class="fas fa-user-circle text-primary" style="font-size: 100px;"></i>
                        </div>
                        <h4 id="profile-username">User</h4>
                        <p class="text-muted mb-0" id="profile-role">User</p>
                    </div>
                </div>
                
                <div class="col-md-8">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0 fw-bold">Change Password</h5>
                        </div>
                        <div class="card-body">
                            <form id="change-password-form">
                                <div class="mb-3">
                                    <label class="form-label fw-medium">Current Password</label>
                                    <input type="password" class="form-control" id="current-password" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-medium">New Password</label>
                                    <input type="password" class="form-control" id="new-password" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-medium">Confirm New Password</label>
                                    <input type="password" class="form-control" id="confirm-new-password" required>
                                </div>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-key me-2"></i>Change Password
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="footer-container"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js?v=3"></script>
    <script src="assets/js/components.js?v=3"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            components.load('profile');
            const user = jwtUtils.getUser();
            document.getElementById('profile-username').textContent = user.username;
            document.getElementById('profile-role').textContent = user.role_name;
            
            document.getElementById('change-password-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const newPass = document.getElementById('new-password').value;
                const confirmPass = document.getElementById('confirm-new-password').value;
                
                if (newPass !== confirmPass) {
                    toastUtils.show('Passwords do not match', 'error');
                    return;
                }
                
                toastUtils.show('Password change would require backend update (not implemented yet)', 'info');
            });
        });
    </script>
</body>
</html>
