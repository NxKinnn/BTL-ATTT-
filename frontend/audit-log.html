<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log - FortressVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div id="navbar-container"></div>
        
        <div class="p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1"><i class="fas fa-history text-primary me-2"></i>Audit Log</h2>
                <p class="text-muted mb-0">Track all system activity</p>
            </div>
            
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="fw-medium">ID</th>
                                    <th class="fw-medium">User</th>
                                    <th class="fw-medium">Action</th>
                                    <th class="fw-medium">Details</th>
                                    <th class="fw-medium">IP Address</th>
                                    <th class="fw-medium">Timestamp</th>
                                </tr>
                            </thead>
                            <tbody id="audit-table-body">
                                <tr><td colspan="6" class="text-center py-4 text-muted">Loading audit logs...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="footer-container"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js?v=3"></script>
    <script src="assets/js/components.js?v=3"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            components.load('audit-log');
            await loadAuditLogs();
        });
        
        async function loadAuditLogs() {
            loadingUtils.show();
            try {
                const user = jwtUtils.getUser() || {};
                const isUserRole = user.role_name === 'User' || window.location.search.includes('mode=my-activity');
                
                if (isUserRole) {
                    const h2 = document.querySelector('h2');
                    if (h2) h2.innerHTML = '<i class="fas fa-user-clock text-primary me-2"></i>My Activity';
                    const p = document.querySelector('.text-muted');
                    if (p) p.textContent = 'Track your personal security events and activity history';
                }
                
                const endpoint = isUserRole ? '/api/audit/my-activity' : '/api/audit/logs';
                const logs = await api.get(endpoint);
                renderAuditLogs(logs);
            } catch (error) {
                toastUtils.show('Failed to load logs. You may not have permission.', 'error');
                if (error && error.status === 403) {
                    setTimeout(() => window.location.href = isUserRole ? 'vault.html' : 'dashboard.html', 1500);
                }
            } finally {
                loadingUtils.hide();
            }
        }
        
        function renderAuditLogs(logs) {
            const tbody = document.getElementById('audit-table-body');
            
            if (!logs.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No audit logs found</td></tr>';
                return;
            }
            
            tbody.innerHTML = logs.map(log => `
                <tr>
                    <td>${log.audit_id}</td>
                    <td><span class="badge bg-secondary">${log.username || log.user_id || 'System'}</span></td>
                    <td><span class="badge bg-primary">${log.action || log.action_name}</span></td>
                    <td>${log.action_details}</td>
                    <td>${log.ip_address || 'N/A'}</td>
                    <td>${new Date(log.created_at).toLocaleString()}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
